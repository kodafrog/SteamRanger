name: Release SteamRanger

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm install

      - name: Debug signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $key = $env:TAURI_SIGNING_PRIVATE_KEY
          Write-Output "Key is null or empty: $([string]::IsNullOrEmpty($key))"
          Write-Output "Key length: $($key.Length)"
          if ($key.Length -gt 0) {
            Write-Output "First 20 chars: $($key.Substring(0, [Math]::Min(20, $key.Length)))"
          }

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: SteamRanger ${{ github.ref_name }}
          releaseBody: |
            See the assets below to download this version of SteamRanger.
          releaseDraft: false
          prerelease: false